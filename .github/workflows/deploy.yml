name: Deploy Laravel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}"
          test -n "${{ secrets.DEPLOY_USER }}"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          test -n "${{ secrets.DEPLOY_PORT }}"
          test -n "${{ secrets.DEPLOY_PATH }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ ! -d .git ]; then
              echo "Diretorio de deploy nao possui repositorio git inicializado."
              exit 1
            fi

            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            if command -v npm >/dev/null 2>&1; then
              npm ci
              npm run build
            else
              echo "npm nao encontrado no servidor; mantendo assets atuais."
            fi

            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            if php artisan list | grep -q "queue:restart"; then
              php artisan queue:restart
            fi

            if php artisan list | grep -q "filament:upgrade"; then
              php artisan filament:upgrade --no-interaction || true
            fi
